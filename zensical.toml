[project]
site_name = "saferaise"
site_description = "Checked exceptions for Python"
site_url = "https://paillat.dev/saferaise/"
repo_url = "https://github.com/Paillat-dev/saferaise"
repo_name = "Paillat-dev/saferaise"
copyright = "Copyright &copy; 2026 <a href=\"https://paillat.dev\">Paillat-dev</a> &mdash; <a href=\"https://github.com/Paillat-dev/saferaise/blob/master/LICENSE\">MIT License</a>"

nav = [
  { "Home" = "index.md" },
  { "How It Works" = "how-it-works.md" },
  { "Examples" = [
    { "Basic Usage" = "examples/basic.md" },
    { "Async Functions" = "examples/async.md" },
    { "Testing" = "examples/testing.md" },
    { "Error Boundaries" = "examples/error-boundaries.md" },
  ] },
  { "Advanced Usage" = "advanced.md" },
  { "API Reference" = "api.md" },
]

[project.theme]
variant = "modern"
features = [
  "navigation.footer",
]

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
primary = "deep purple"
accent = "purple"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"
palette.primary = "deep purple"
palette.accent = "purple"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/Paillat-dev/saferaise"
name = "saferaise on GitHub"

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = true
show_signature_annotations = true
show_root_heading = true
show_root_full_path = false
heading_level = 3
members_order = "source"