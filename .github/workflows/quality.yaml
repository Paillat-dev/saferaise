name: Quality Checks

on:
  workflow_call:

jobs:
  quality:
    runs-on: ubuntu-latest

    name: "Quality Checks"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: "Install uv"
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          enable-cache: true

      - name: "Set up Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: "pyproject.toml"

      - name: "Install dependencies"
        run: uv sync --group dev

      - name: "Format Check"
        id: format
        continue-on-error: true
        run: "uv run ruff format --check --preview --output-format github"

      - name: "Lint Check"
        id: lint
        continue-on-error: true
        run: "uv run ruff check --output-format github"

      - name: "Type Check"
        id: typecheck
        continue-on-error: true
        run: "uv run basedpyright src"

  quality-pnpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: "Install pnpm"
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          cache: true

      - name: "Install dependencies"
        run: pnpm install

      - name: "Format Check"
        id: format
        continue-on-error: true
        run: "pnpm run format:check"

  tests:
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.13"]
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: "Setup Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install . --group dev

      - name: "Run tests"
        run: tox
  tests-pass: # ref: https://github.com/orgs/community/discussions/4324#discussioncomment-3477871
    runs-on: ubuntu-latest
    needs: [tests]
    if: always() && github.event_name != 'schedule'
    steps:
      - name: "Tests succeeded"
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: exit 0
      - name: "Tests failed"
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
