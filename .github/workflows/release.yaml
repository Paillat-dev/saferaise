name: Release
on:
  push:
    tags: [ "v*.*.*" ]

jobs:
  quality:
    uses: ./.github/workflows/quality.yaml
    permissions:
      contents: read

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      id-token: write
      contents: write
    environment:
      name: pypi
      url: https://pypi.org/project/saferaise/

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: "Set up Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: "pyproject.toml"

      - name: "Install uv"
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          enable-cache: true

      - name: "Install dependencies"
        run: uv sync
        env:
          UV_PYTHON_DOWNLOADS: "false"
          UV_FROZEN: "true"

      - name: "Build"
        run: uv build

      - name: "Publish"
        run: uv publish

      - name: "Generate Changelog"
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ${{ steps.cliff.outputs.content }}
            ## Upgrade
            ```bash
            pip install -U saferaise
            ```
            
            ---

  deploy-docs:
    needs: [quality, publish]
    name: Deploy docs
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: "Set up Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: "pyproject.toml"

      - name: "Install uv"
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          enable-cache: true

      - name: "Install dependencies"
        run: uv sync --group docs
        env:
          UV_PYTHON_DOWNLOADS: "false"
          UV_FROZEN: "true"

      - name: "Build docs"
        run: uv run zensical build --clean

      - name: "Upload docs"
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: site

      - name: "Upload docs to GitHub Pages"
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
        id: deployment
